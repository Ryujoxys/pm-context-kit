# Drop this block into your Codex MCP config file.
# Common locations (verify against your Codex client version):
#   - ~/.codex/config.toml
#   - ~/.config/codex/config.toml
#   - the per-project codex config if your client supports one
# If unsure, check `codex --help` or your client's docs for the MCP config path.
[mcp_servers.code-context]
command = "uv"
args = ["run", "--project", "/absolute/path/to/pm-context-kit/server", "code-context-mcp"]

[mcp_servers.code-context.env]
CODE_CONTEXT_REPOS_ROOT = "/absolute/path/to/pm-context-kit/repos"
CODE_CONTEXT_CONFIG = "/absolute/path/to/pm-context-kit/config/repos.yaml"
CODE_CONTEXT_VISIBILITY_CONFIG = "/absolute/path/to/pm-context-kit/config/visibility.yaml"
